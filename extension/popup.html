<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>RA2 Unit Names</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>RA2 單位名稱</h1>
    <div id="status" class="status status-unknown">尚未連線</div>
  </header>

  <main>
    <label class="row">
      <input type="checkbox" id="enabled">
      <div class="row-text">
        <div class="row-title">顯示單位名稱</div>
        <div class="row-sub">在每個單位上方顯示名稱</div>
      </div>
    </label>

    <label class="row" id="row-neutral">
      <input type="checkbox" id="chk-neutral">
      <div class="row-text">
        <div class="row-title">顯示中立單位</div>
        <div class="row-sub">綠色標示中立建築與單位（裝飾物除外）</div>
      </div>
    </label>

    <div class="row row-select" id="row-fontsize">
      <div class="row-text">
        <div class="row-title">標籤字體大小</div>
        <div class="row-sub">單位名稱標籤的字體大小（像素）</div>
      </div>
      <select id="sel-fontsize">
        <option value="10">10 px</option>
        <option value="12">12 px</option>
        <option value="14">14 px</option>
        <option value="16">16 px</option>
        <option value="18">18 px</option>
        <option value="20">20 px</option>
      </select>
    </div>

    <label class="row" id="row-indicators">
      <input type="checkbox" id="chk-indicators">
      <div class="row-text">
        <div class="row-title">顯示畫面外敵人指標</div>
        <div class="row-sub">在螢幕邊緣顯示敵人位置指標</div>
      </div>
    </label>

    <details id="section-filter" class="filter-section">
      <summary class="filter-summary">
        <span class="filter-summary-title">單位篩選</span>
        <span id="filter-badge" class="filter-badge"></span>
      </summary>
      <div class="filter-body">
        <div id="filter-note" class="filter-note">請先連線至遊戲</div>
        <input
          type="text"
          id="filter-search"
          class="filter-search"
          placeholder="搜尋單位名稱…"
          autocomplete="off"
          style="display:none"
        >
        <div class="filter-toolbar" style="display:none">
          <button id="filter-all"  class="small">全選</button>
          <button id="filter-none" class="small">全不選</button>
          <span id="filter-count-label" class="filter-count-label"></span>
        </div>
        <div id="filter-list" class="filter-list"></div>
      </div>
    </details>

    <div class="actions">
      <button id="apply" class="primary">套用</button>
    </div>

    <div id="msg" class="msg"></div>
  </main>

  <footer>
    遊戲頁面開啟時才會生效
  </footer>

  <script src="popup.js"></script>
</body>
</html>
